name: Daily Movie Scraper

on:
  schedule:
    # Runs every minute
    - cron: '* * * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    # Required permissions to allow github-actions[bot] to push commits
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python scraper
        run: python scripts/scraper.py

      - name: Commit and Push changes
        run: |
          # Set up git config for the bot
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Stage the JSON file
          git add movies/movies.json
          
          # Check if there are any changes to commit
          git commit -m "Automated update: fetched latest YouTube movies" || echo "No changes to commit"
          
          # Push the changes
          git push origin HEAD:main
